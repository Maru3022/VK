groups:
  - name: vk
    rules:
      - alert: VkHighErrorRate
        expr: >
          rate(vk_requests_total{status="error"}[5m]) 
          / rate(vk_requests_total[5m]) > 0.01
        for: 2m
        labels: {severity: warning}
        annotations: {summary: "Error rate > 1%"}

      - alert: VkHighLatency
        expr: >
          histogram_quantile(0.99, 
            rate(vk_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels: {severity: warning}
        annotations: {summary: "p99 latency > 500ms"}

      - alert: VkRedisDown
        expr: vk_service_redis_health == 0
        for: 30s
        labels: {severity: critical}
        annotations: {summary: "Redis is down"}
