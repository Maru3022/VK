groups:
  - name: vk
    rules:
      - alert: VkHighErrorRate
        expr: >
          rate(vk_requests_total{status="error"}[5m])
          / rate(vk_requests_total[5m]) > 0.01
        for: 2m
        labels: {severity: warning}
        annotations: {summary: "Error rate > 1%"}

      - alert: VkHighLatency
        expr: >
          histogram_quantile(0.99,
            rate(vk_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels: {severity: warning}
        annotations: {summary: "p99 latency > 500ms"}

      - alert: VkRedisDown
        expr: spring_data_redis_connection_factory_active_connections{state="down"} == 1 or on() up{job="vk-service"} == 0
        for: 30s
        labels: {severity: critical}
        annotations: {summary: "Redis health check is down"}
