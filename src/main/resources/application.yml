spring:
  application:
    name: vk-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 20
          min-idle: 2

tarantool:
  host: ${TARANTOOL_HOST:localhost}
  port: ${TARANTOOL_PORT:3301}
  user: ${TARANTOOL_USER:guest}
  password: ${TARANTOOL_PASSWORD:}
  connect-timeout-ms: 3000
  read-timeout-ms: 3000
  pool:
    min-connections: 2
    max-connections: 10

redis:
  ttl-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        vk.request.duration: true

grpc:
  server:
    port: 9090
