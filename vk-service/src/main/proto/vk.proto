syntax = "proto3";

package vk;

option java_package = "com.example.vk.proto";
option java_multiple_files = true;

import "google/protobuf/wrappers.proto";

service VkService {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Range(RangeRequest) returns (stream VkPair);
  rpc Count(CountRequest) returns (CountResponse);
}

message PutRequest {
  string key = 1;
  google.protobuf.BytesValue value = 2;
}

message PutResponse {
  bool updated = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  string key = 1;
  google.protobuf.BytesValue value = 2;
  bool found = 3;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool deleted = 1;
}

message RangeRequest {
  string key_since = 1;
  string key_to = 2;
  int32 page_size = 3;
}

message VkPair {
  string key = 1;
  google.protobuf.BytesValue value = 2;
}

message CountRequest {}

message CountResponse {
  int64 count = 1;
}
