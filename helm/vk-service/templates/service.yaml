apiVersion: v1
kind: Service
metadata:
  name: {{ include "vk-service.fullname" . }}
  labels:
    app: vk-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: vk-service
