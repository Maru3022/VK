image:
  repository: ghcr.io/YOUR_USERNAME/vk-service
  tag: latest
  pullPolicy: Always

replicaCount: 2

service:
  grpcPort: 9090
  metricsPort: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

tarantool:
  host: tarantool-svc
  port: 3301
  user: guest
  password: ""

redis:
  host: redis-svc
  port: 6379
  password: ""
  ttlSeconds: 60

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  cpuTargetPercent: 70

serviceMonitor:
  enabled: false
